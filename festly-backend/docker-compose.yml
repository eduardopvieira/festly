services:
  db:
    image: postgres:15-alpine
    container_name: festly-db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=festly
    ports:
      - "5432:5432"
    volumes:
      - festly_data:/var/lib/postgresql/data

volumes:
  festly_data: